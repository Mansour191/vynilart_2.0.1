// Search Products
export const SEARCH_PRODUCTS_QUERY = gql`
  query SearchProducts($searchTerm: String!, $first: Int, $after: String, $filter: ProductsFilterInput) {
  products(
    filter: { 
      nameAr_Icontains: $searchTerm, 
      nameEn_Icontains: $searchTerm,
      descriptionAr_Icontains: $searchTerm,
      descriptionEn_Icontains: $searchTerm,
      isActive: true,
      ...$filter
    }, 
    first: $first
    after: $after
    orderBy: "-createdAt"
  ) {
    edges {
      node {
        id
        nameAr
        nameEn
        slug
        descriptionAr
        descriptionEn
        basePrice
        cost
        category {
          id
          nameAr
          nameEn
          slug
          icon
        }
        onSale
        discountPercent
        isFeatured
        isNew
        isActive
        stock
        weight
        dimensions
        tags
        seoTitle
        seoDescription
        createdAt
        updatedAt
        images {
          id
          imageUrl
          altText
          isMain
          sortOrder
        }
        variants {
          id
          name
          sku
          price
          stock
          attributes
          isActive
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
