// ProductVariant Mutations
export const CREATE_PRODUCT_VARIANT_MUTATION = gql`
  mutation CreateProductVariant(
    $productId: ID!
    $name: String!
    $sku: String!
    $price: Float!
    $stock: Int
    $attributes: JSONString
    $isActive: Boolean
  ) {
    createProductVariant(
      productId: $productId
      name: $name
      sku: $sku
      price: $price
      stock: $stock
      attributes: $attributes
      isActive: $isActive
    ) {
      success
      message
      productVariant {
        id
        name
        sku
        price
        stock
        attributes
        isActive
        createdAt
        updatedAt
        product {
          id
          nameAr
          nameEn
        }
      }
    }
  }
`;

export const UPDATE_PRODUCT_VARIANT_MUTATION = gql`
  mutation UpdateProductVariant(
    $id: ID!
    $name: String
    $sku: String
    $price: Float
    $stock: Int
    $attributes: JSONString
    $isActive: Boolean
  ) {
    updateProductVariant(
      id: $id
      name: $name
      sku: $sku
      price: $price
      stock: $stock
      attributes: $attributes
      isActive: $isActive
    ) {
      success
      message
      productVariant {
        id
        name
        sku
        price
        stock
        attributes
        isActive
        createdAt
        updatedAt
        product {
          id
          nameAr
          nameEn
        }
      }
    }
  }
`;

export const DELETE_PRODUCT_VARIANT_MUTATION = gql`
  mutation DeleteProductVariant($id: ID!) {
    deleteProductVariant(id: $id) {
      success
      message
    }
  }
`;

