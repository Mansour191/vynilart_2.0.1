import { gql } from '@apollo/client';

// Product by ID with full relationships
export const PRODUCT_BY_ID_QUERY = gql`
  query GetProductById($id: ID!) {
    product(id: $id) {
      id
      nameAr
      nameEn
      slug
      descriptionAr
      descriptionEn
      basePrice
      cost
      category {
        id
        nameAr
        nameEn
        slug
        icon
        image
      }
      onSale
      discountPercent
      isFeatured
      isNew
      isActive
      stock
      weight
      dimensions
      tags
      seoTitle
      seoDescription
      syncStatus
      erpnextItemCode
      syncError
      lastSyncedAt
      createdAt
      updatedAt
      images {
        id
        imageUrl
        altText
        isMain
        sortOrder
        createdAt
      }
      variants {
        id
        name
        sku
        price
        stock
        attributes
        isActive
        createdAt
        updatedAt
      }
      materials {
        id
        nameAr
        nameEn
        description
        pricePerM2
        isPremium
        isActive
        image
        properties
        createdAt
        updatedAt
      }
    }
  }
`;

