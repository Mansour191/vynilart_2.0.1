// Category Tree Query (Hierarchical structure)
export const CATEGORY_TREE_QUERY = gql`
  query GetCategoryTree {
    categoryTree {
      id
      nameAr
      nameEn
      slug
      icon
      image
      description
      wastePercent
      isActive
      level
      children {
        id
        nameAr
        nameEn
        slug
        icon
        image
        description
        wastePercent
        isActive
        level
        children {
          id
          nameAr
          nameEn
          slug
          icon
          image
          description
          wastePercent
          isActive
          level
        }
      }
      createdAt
      updatedAt
    }
  }
`;
