import { gql } from '@apollo/client';

// Categories Query with Tree Structure Support
export const ALL_CATEGORIES_QUERY = gql`
  query GetAllCategories {
    categories {
      id
      nameAr
      nameEn
      slug
      icon
      image
      description
      wastePercent
      isActive
      parent {
        id
        nameAr
        nameEn
        slug
      }
      children {
        id
        nameAr
        nameEn
        slug
        icon
        image
        description
        wastePercent
        isActive
        parent {
          id
          nameAr
          nameEn
          slug
        }
        children {
          id
          nameAr
          nameEn
          slug
          icon
          image
          description
          wastePercent
          isActive
        }
      }
      createdAt
      updatedAt
    }
  }
`;

// Category by Slug Query
