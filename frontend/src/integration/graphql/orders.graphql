`;

// Add order timeline entry
export const ADD_TIMELINE_MUTATION = gql`
  mutation AddTimelineEntry($orderId: ID!, $status: String!, $note: String) {
    addTimelineEntry(orderId: $orderId, status: $status, note: $note) {
      success
      message
      timelineEntry {
        id
        status
        note
        createdAt
      }
    }
  }
`;

// Get order statistics
export const ORDER_STATS_QUERY = gql`
  query GetOrderStats($dateFrom: String, $dateTo: String) {
    orderStats(dateFrom: $dateFrom, dateTo: $dateTo) {
      totalOrders
      totalRevenue
      ordersByStatus {
        status
        count
        revenue
      }
      ordersByPaymentMethod {
        method
        count
        revenue
      }
      ordersByWilaya {
        wilaya {
          id
          nameAr
          nameFr
        }
        count
        revenue
      }
    }
  }
`;

// Generate PDF invoice
export const GENERATE_INVOICE_MUTATION = gql`
  mutation GenerateInvoice($orderId: ID!) {
    generateInvoice(orderId: $orderId) {
