// Update order status
export const UPDATE_ORDER_STATUS_MUTATION = gql`
  mutation UpdateOrderStatus($id: ID!, $status: String!, $note: String) {
    updateOrderStatus(id: $id, status: $status, note: $note) {
      success
      message
      order {
        id
        orderNumber
        status
        updatedAt
        timeline {
          id
          status
          note
          createdAt
        }
      }
    }
  }
`;

// Update tracking number
