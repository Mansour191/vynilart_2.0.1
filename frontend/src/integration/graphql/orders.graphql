import { gql } from '@apollo/client/core';

// Create order mutation
export const CREATE_ORDER_MUTATION = gql`
  mutation CreateOrder($input: OrderInput!, $items: [OrderItemInput!]!) {
    createOrder(input: $input, items: $items) {
      success
      message
      order {
        id
        orderNumber
        user {
          id
          username
          email
          firstName
          lastName
        }
        customerName
        phone
        email
        shippingAddress
        wilaya {
          id
          wilayaId
          nameAr
          nameFr
        }
        subtotal
        shippingCost
        tax
        discountAmount
        totalAmount
        status
        paymentMethod
        paymentStatus
        notes
        syncStatus
        erpnextSalesOrderId
        createdAt
        updatedAt
        items {
          id
          product {
            id
            nameAr
            nameEn
            slug
            basePrice
            images {
              id
              imageUrl
              altText
              isMain
            }
          }
          material {
            id
            nameAr
            nameEn
            pricePerM2
            isPremium
            image
          }
          quantity
          price
          width
          height
          dimensionUnit
          marbleTexture
          customDesign
        }
        timeline {
          id
          status
          note
          createdAt
        }
      }
    }
  }
`;

