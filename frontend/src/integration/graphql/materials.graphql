import { gql } from '@apollo/client';

// All Materials Query
export const ALL_MATERIALS_QUERY = gql`
  query GetAllMaterials($filter: MaterialsFilterInput, $first: Int, $after: String) {
    materials(filter: $filter, first: $first, after: $after) {
      edges {
        node {
          id
          nameAr
          nameEn
          description
          pricePerM2
          isPremium
          isActive
          image
          properties
          createdAt
          updatedAt
        }
        cursor
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
      totalCount
    }
  }
`;

